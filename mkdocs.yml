site_name: Sovereign Bio-Shield Ultimate Documentation
site_description: Enterprise Deepfake Detection Platform
site_author: BioShield Security Team
repo_url: https://github.com/your-org/bioshield-ultimate

theme:
  name: material
  palette:
    primary: red
    accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Deployment: deployment.md
  - Operations: operations.md
  - Security: security.md
  - FAQ: faq.md
