/var/log/bioshield/*.log {
    daily
    rotate 30
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    create 0640 bioshield bioshield
    postrotate
        systemctl kill -s HUP rsyslog.service >/dev/null 2>&1 || true
        docker exec bioshield-api kill -HUP 1 >/dev/null 2>&1 || true
    endscript
}

/var/log/nginx/*.log {
    daily
    rotate 30
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 `cat /var/run/nginx.pid`
    endscript
}

/var/log/postgresql/*.log {
    daily
    rotate 30
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        systemctl reload postgresql >/dev/null 2>&1 || true
    endscript
}

/var/log/redis/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        redis-cli ping >/dev/null 2>&1 || true
    endscript
}
