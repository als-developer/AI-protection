global
    log /dev/log local0 info
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    user haproxy
    group haproxy
    daemon
    maxconn 100000
    ssl-default-bind-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 no-tlsv12
    stats socket /var/lib/haproxy/stats mode 600 level admin
    stats timeout 30s

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    option redispatch
    timeout connect 2s
    timeout client 5s
    timeout server 5s
    timeout queue 1s
    maxconn 80000

frontend bioshield_https_frontend
    bind :443 ssl crt /etc/ssl/certs/bioshield.pem alpn h2,http/1.1
    bind :80
    http-request redirect scheme https unless { ssl_fc }
    option forwardfor
    http-request set-header X-Forwarded-Proto https
    
    acl is_voice_audit path_beg /v1/audit-voice
    acl is_health path_beg /v1/health
    
    use_backend bioshield_backend if is_voice_audit
    use_backend bioshield_backend if is_health

backend bioshield_backend
    balance roundrobin
    option httpchk GET /v1/health/liveness
    http-check expect status 200
    timeout queue 1s
    timeout server 5s
    
    server bioshield-01 10.140.10.12:8000 check inter 2s rise 2 fall 3 maxconn 20000
    server bioshield-02 10.140.10.13:8000 check inter 2s rise 2 fall 3 maxconn 20000
    server bioshield-03 10.140.10.14:8000 check inter 2s rise 2 fall 3 maxconn 20000

backend bioshield_stats
    stats enable
    stats uri /stats
    stats auth admin:VAULTED_STATS_PASS
    stats refresh 5s
