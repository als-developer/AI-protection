name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.22'
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Python linting
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: pip install flake8 black
    - run: flake8 api/ --max-line-length=120 --ignore=E203,W503
    - run: black --check api/
    
    - name: Run Go linting
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    - run: go vet ./monitoring/prometheus/exporters/...
    - run: gofmt -l monitoring/prometheus/exporters/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-go@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: pip install pytest pytest-cov pytest-asyncio httpx
    - run: pytest tests/unit/ --cov=api --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        load: true
        tags: bioshield/api:test
    
    - name: Build Engine image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.engine
        load: true
        tags: bioshield/engine:test
    
    - name: Run integration tests
      run: |
        docker-compose -f docker/docker-compose.yml up -d
        sleep 10
        curl -f http://localhost:8000/v1/health
        docker-compose -f docker/docker-compose.yml down
