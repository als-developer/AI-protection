name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  GO_VERSION: '1.22'
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run Python tests
      run: |
        pytest tests/unit/ --cov=api --cov-report=xml
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Run Go tests
      run: |
        cd monitoring/prometheus/exporters
        go test -v ./...
    
    - name: Compile C++ core
      run: |
        cd core
        g++ -O3 -march=native -std=c++23 -c *.cpp
        g++ -shared -o libbioshield.so *.o
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build API image
      uses: docker/build-push-action@v5
      with:
        context: ./api
        file: ./docker/Dockerfile.api
        tags: bioshield/api:latest
        load: true
    
    - name: Build Engine image
      uses: docker/build-push-action@v5
      with:
        context: ./core
        file: ./docker/Dockerfile.engine
        tags: bioshield/engine:latest
        load: true
    
    - name: Run integration tests
      run: |
        docker-compose -f docker-compose.test.yml up -d
        ./tests/integration/test_e2e.sh
        docker-compose -f docker-compose.test.yml down
