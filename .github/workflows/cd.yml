name: Continuous Deployment

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'
    
    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 --decode > $HOME/.kube/config
    
    - name: Deploy to staging
      run: |
        kubectl apply -f infra/kubernetes/namespace.yaml
        kubectl apply -f infra/kubernetes/configmap.yaml
        kubectl apply -f infra/kubernetes/secret.yaml
        kubectl apply -f infra/kubernetes/deployment.yaml
        kubectl rollout status deployment/bioshield-core -n bioshield-system --timeout=5m

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v4
    
    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 --decode > $HOME/.kube/config
    
    - name: Deploy to production
      run: |
        kubectl apply -f infra/kubernetes/production/
        kubectl rollout status deployment/bioshield-core -n bioshield-system --timeout=10m
    
    - name: Notify deployment
      run: |
        curl -X POST -H "Content-Type: application/json" \
          -d '{"text":"✅ BioShield Ultimate deployed to production: ${{ github.ref_name }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
