name: Continuous Deployment

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/bioshield-api
  IMAGE_NAME_ENGINE: ${{ github.repository }}/bioshield-engine

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.ref_name }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:latest
    
    - name: Build and push Engine image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.engine
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ENGINE }}:${{ github.ref_name }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ENGINE }}:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment: staging
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'
    
    - name: Set kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 --decode > $HOME/.kube/config
    
    - name: Deploy to staging
      run: |
        kubectl set image deployment/bioshield-api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.ref_name }} -n bioshield-system
        kubectl rollout status deployment/bioshield-api -n bioshield-system --timeout=5m

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v4
    
    - name: Set kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 --decode > $HOME/.kube/config
    
    - name: Deploy to production
      run: |
        kubectl set image deployment/bioshield-api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.ref_name }} -n bioshield-system
        kubectl set image deployment/bioshield-engine engine=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ENGINE }}:${{ github.ref_name }} -n bioshield-system
        kubectl rollout status deployment/bioshield-api -n bioshield-system --timeout=10m
        kubectl rollout status deployment/bioshield-engine -n bioshield-system --timeout=10m
    
    - name: Notify deployment
      run: |
        curl -X POST -H "Content-Type: application/json" \
          -d '{"text":"✅ BioShield Ultimate ${{ github.ref_name }} deployed to production"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
