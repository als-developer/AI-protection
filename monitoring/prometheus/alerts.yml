groups:
  - name: bioshield_alerts
    interval: 30s
    rules:
      - alert: HighDeepfakeDetectionRate
        expr: rate(bioshield_deepfake_detections_total[5m]) > 10
        for: 1m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "High rate of deepfake detections"
          description: "Detected {{ $value }} deepfakes per second in last 5 minutes"

      - alert: APILatencyHigh
        expr: histogram_quantile(0.99, rate(bioshield_request_latency_seconds_bucket[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "API latency is high"
          description: "99th percentile latency is {{ $value }}s"

      - alert: RateLimitExceeded
        expr: rate(bioshield_rate_limit_exceeded_total[1m]) > 100
        for: 1m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "Rate limit exceeded frequently"
          description: "Rate limit exceeded {{ $value }} times per minute"

      - alert: EngineDown
        expr: up{job="bioshield-engine"} == 0
        for: 30s
        labels:
          severity: critical
          team: operations
        annotations:
          summary: "Core engine is down"
          description: "C++ engine has been unreachable for 30 seconds"

      - alert: QueueDepthHigh
        expr: bioshield_queue_depth > 10000
        for: 1m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "Processing queue depth is high"
          description: "Queue depth is {{ $value }} items"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          team: operations
        annotations:
          summary: "Low disk space"
          description: "Only {{ $value }}% disk space remaining"

      - alert: HighCPUUsage
        expr: rate(node_cpu_seconds_total{mode="user"}[2m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"
