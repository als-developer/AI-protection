global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/BIOSHIELD/PROD/WEBHOOK'

route:
  group_by: ['alertname', 'cluster', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 4h
  receiver: 'slack-prod'
  
  routes:
  - match:
      severity: critical
    receiver: 'pagerduty-critical'
    continue: true
  - match:
      severity: high
    receiver: 'slack-high'
    continue: true
  - match:
      severity: warning
    receiver: 'slack-warning'

receivers:
- name: 'pagerduty-critical'
  pagerduty_configs:
  - service_key: 'PAGERDUTY_CRITICAL_KEY'
    send_resolved: true
    severity: critical

- name: 'slack-prod'
  slack_configs:
  - channel: '#bioshield-alerts'
    title: '🚨 BioShield Production Alert'
    text: |-
      *Alert:* {{ .CommonAnnotations.summary }}
      *Severity:* {{ .CommonLabels.severity }}
      *Description:* {{ .CommonAnnotations.description }}
      *Time:* {{ .StartsAt }}
    color: 'danger'

- name: 'slack-high'
  slack_configs:
  - channel: '#bioshield-alerts'
    title: '⚠️ BioShield High Priority Alert'
    color: 'warning'

- name: 'slack-warning'
  slack_configs:
  - channel: '#bioshield-alerts'
    title: 'ℹ️ BioShield Info Alert'
    color: 'good'

inhibit_rules:
- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: ['alertname', 'cluster']
