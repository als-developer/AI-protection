version: '3.8'

services:
  api-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      - REDIS_HOST=redis-test
      - DATABASE_URL=postgresql://test:test@postgres-test:5432/bioshield_test
      - TESTING=true
    depends_on:
      - postgres-test
      - redis-test
    command: pytest tests/ -v

  postgres-test:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=bioshield_test
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 1s
      timeout: 1s
      retries: 10

  redis-test:
    image: redis:7-alpine
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 1s
      retries: 10
