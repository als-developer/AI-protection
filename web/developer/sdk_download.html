<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioShield - SDK Downloads</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="container mx-auto px-4 py-12 max-w-5xl">
        <div class="text-center mb-12"><div class="text-6xl mb-4">📦</div><h1 class="text-3xl font-bold">SDK Downloads</h1><p class="text-slate-400 mt-2">Official BioShield SDKs for all major platforms</p></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 text-center hover:border-emerald-500 transition-all"><div class="text-5xl mb-3">🐍</div><h3 class="font-bold text-lg">Python SDK</h3><p class="text-xs text-slate-400 mt-1">v1.0.0</p><button onclick="downloadSDK('python')" class="mt-4 bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm w-full">Download</button></div>
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 text-center hover:border-emerald-500 transition-all"><div class="text-5xl mb-3">📘</div><h3 class="font-bold text-lg">Node.js SDK</h3><p class="text-xs text-slate-400 mt-1">v1.0.0</p><button onclick="downloadSDK('node')" class="mt-4 bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm w-full">Download</button></div>
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 text-center hover:border-emerald-500 transition-all"><div class="text-5xl mb-3">☕</div><h3 class="font-bold text-lg">Java SDK</h3><p class="text-xs text-slate-400 mt-1">v1.0.0</p><button onclick="downloadSDK('java')" class="mt-4 bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm w-full">Download</button></div>
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 text-center hover:border-emerald-500 transition-all"><div class="text-5xl mb-3">⚡</div><h3 class="font-bold text-lg">Go SDK</h3><p class="text-xs text-slate-400 mt-1">v1.0.0</p><button onclick="downloadSDK('go')" class="mt-4 bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm w-full">Download</button></div>
        </div>

        <div class="mt-8 bg-slate-900 border border-slate-800 rounded-xl p-6 text-center"><p class="text-sm text-slate-400">Installation instructions available in our <a href="#" class="text-cyan-400">documentation</a></p></div>
    </div>

    <script>function downloadSDK(lang) { alert(`Downloading ${lang} SDK...`); }</script>
</body>
</html>
