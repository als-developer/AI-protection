<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - BioShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="container mx-auto px-4 py-20 max-w-2xl text-center">
        <div class="bg-emerald-500/20 border border-emerald-500 rounded-full w-24 h-24 flex items-center justify-center mx-auto mb-6">
            <div class="text-5xl">✅</div>
        </div>
        
        <h1 class="text-3xl font-bold mb-4">Payment Successful!</h1>
        <p class="text-slate-400 mb-8">Your API credits have been added to your account.</p>
        
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 mb-8 text-left">
            <h3 class="font-bold mb-3">Transaction Details</h3>
            <div id="transaction-details" class="space-y-2 text-sm">
                <div class="flex justify-between"><span class="text-slate-400">Order ID:</span><span id="order-id" class="font-mono">--</span></div>
                <div class="flex justify-between"><span class="text-slate-400">Amount:</span><span id="amount" class="text-emerald-400">--</span></div>
                <div class="flex justify-between"><span class="text-slate-400">Status:</span><span class="text-emerald-400">COMPLETED</span></div>
                <div class="flex justify-between"><span class="text-slate-400">Date:</span><span id="date">--</span></div>
            </div>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/dashboard/index.html" class="bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-xl font-bold transition-all">Go to Dashboard</a>
            <a href="/billing/checkout.html" class="border border-slate-700 hover:bg-slate-800 px-6 py-3 rounded-xl font-bold transition-all">Buy More Credits</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        const amount = urlParams.get('amount');
        
        document.getElementById('order-id').innerText = orderId || 'N/A';
        document.getElementById('amount').innerText = amount ? `$${parseFloat(amount).toFixed(2)}` : 'N/A';
        document.getElementById('date').innerText = new Date().toLocaleString();
    </script>
</body>
</html>
