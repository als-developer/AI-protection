<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioShield - Live Threat Counter</title>
    <style>
        .counter-badge {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
            font-family: monospace;
            min-width: 200px;
        }
        .counter-number {
            font-size: 36px;
            font-weight: bold;
            color: #ef4444;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; margin-right: 6px; }
    </style>
</head>
<body style="background: transparent; padding: 20px; display: flex; justify-content: center;">
    <div class="counter-badge">
        <div class="live-dot"></div>
        <span style="color: #94a3b8; font-size: 12px;">THREATS BLOCKED TODAY</span>
        <div class="counter-number" id="threat-counter">0</div>
        <div style="font-size: 10px; color: #64748b; margin-top: 8px;">BioShield Protected</div>
    </div>

    <script>
        let count = 347;
        const counter = document.getElementById('threat-counter');
        counter.innerText = count;
        setInterval(() => { count += Math.floor(Math.random() * 3); counter.innerText = count; }, 5000);
    </script>
</body>
</html>
