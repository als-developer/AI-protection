<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioShield Trust Badge - Security Verified</title>
    <style>
        .trust-badge {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border: 1px solid #ef4444;
            border-radius: 40px;
            padding: 6px 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .trust-badge:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
        .badge-icon {
            font-size: 18px;
            margin-right: 8px;
        }
        .badge-text {
            font-size: 13px;
            font-weight: 600;
            color: white;
        }
        .badge-subtext {
            font-size: 10px;
            color: #94a3b8;
            margin-left: 8px;
        }
        .badge-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body style="background: transparent; padding: 20px; display: flex; justify-content: center;">
    <a href="#" class="trust-badge" id="trust-badge" onclick="showModal()">
        <span class="badge-icon">🛡️</span>
        <span class="badge-text">BioShield Protected</span>
        <span class="badge-subtext">Real-time deepfake defense</span>
        <span class="badge-dot"></span>
    </a>

    <!-- Modal -->
    <div id="modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; max-width: 400px; width: 90%; padding: 24px; position: relative;">
            <button onclick="closeModal()" style="position: absolute; top: 12px; right: 16px; background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer;">✕</button>
            <div style="text-align: center;">
                <div style="font-size: 48px; margin-bottom: 12px;">🛡️</div>
                <h3 style="font-size: 18px; font-weight: bold; color: white; margin-bottom: 8px;">BioShield Verified Security</h3>
                <p style="font-size: 13px; color: #94a3b8; margin-bottom: 16px;">This site is protected by real-time deepfake detection</p>
                <div style="background: #1e293b; border-radius: 12px; padding: 16px; text-align: left; margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span style="font-size: 12px; color: #64748b;">Status:</span>
                        <span style="font-size: 12px; color: #10b981;">✓ Active</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span style="font-size: 12px; color: #64748b;">Threats Blocked:</span>
                        <span style="font-size: 12px; color: white;">12,847</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="font-size: 12px; color: #64748b;">Uptime:</span>
                        <span style="font-size: 12px; color: white;">99.999%</span>
                    </div>
                </div>
                <button onclick="closeModal()" style="background: #ef4444; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">Got it</button>
            </div>
        </div>
    </div>

    <script>
        function showModal() {
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
