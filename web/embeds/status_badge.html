<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioShield - Status Badge</title>
    <style>
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 30px;
            padding: 4px 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .status-badge:hover {
            background: #1e293b;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        .status-dot.ok { background: #10b981; }
        .status-dot.warning { background: #f59e0b; }
        .status-dot.error { background: #ef4444; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body style="background: transparent; padding: 20px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
    
    <!-- Example 1: OK Status -->
    <div class="status-badge" onclick="showStatus('ok')">
        <div class="status-dot ok"></div>
        <span>BioShield: Protected</span>
    </div>

    <!-- Example 2: Warning Status -->
    <div class="status-badge" onclick="showStatus('warning')">
        <div class="status-dot warning"></div>
        <span>BioShield: Review Needed</span>
    </div>

    <!-- Example 3: Error Status -->
    <div class="status-badge" onclick="showStatus('error')">
        <div class="status-dot error"></div>
        <span>BioShield: Attention Required</span>
    </div>

    <div id="status-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; max-width: 300px; width: 90%; padding: 20px; text-align: center;">
            <h3 id="modal-title" style="color: white; margin-bottom: 10px;">BioShield Status</h3>
            <p id="modal-message" style="color: #94a3b8; font-size: 13px;"></p>
            <button onclick="closeModal()" style="background: #3b82f6; border: none; color: white; padding: 8px 20px; border-radius: 8px; margin-top: 16px; cursor: pointer;">Close</button>
        </div>
    </div>

    <script>
        function showStatus(type) {
            const modal = document.getElementById('status-modal');
            const title = document.getElementById('modal-title');
            const message = document.getElementById('modal-message');
            
            if (type === 'ok') {
                title.innerHTML = '✅ System Operational';
                message.innerHTML = 'All systems are functioning normally. Deepfake protection active.';
            } else if (type === 'warning') {
                title.innerHTML = '⚠️ Review Recommended';
                message.innerHTML = 'Suspicious patterns detected. Please check dashboard.';
            } else {
                title.innerHTML = '🚨 Attention Required';
                message.innerHTML = 'Security incident detected. Immediate action recommended.';
            }
            
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('status-modal').style.display = 'none';
        }
    </script>
</body>
</html>
