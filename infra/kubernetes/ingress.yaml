apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bioshield-ingress
  namespace: bioshield-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "10000"
    nginx.ingress.kubernetes.io/rate-limit-burst: "15000"
spec:
  tls:
  - hosts:
    - api.bioshield.secure-bank.internal
    secretName: bioshield-tls
  rules:
  - host: api.bioshield.secure-bank.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bioshield-api
            port:
              number: 8000
