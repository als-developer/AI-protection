apiVersion: v1
kind: Service
metadata:
  name: bioshield-api
  namespace: bioshield-system
  labels:
    app: bioshield
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: bioshield
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: bioshield-api-lb
  namespace: bioshield-system
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  ports:
  - port: 443
    targetPort: 8000
    protocol: TCP
    name: https
  selector:
    app: bioshield
    component: api
