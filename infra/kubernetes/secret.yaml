apiVersion: v1
kind: Secret
metadata:
  name: bioshield-secrets
  namespace: bioshield-system
type: Opaque
stringData:
  database.url: "postgresql://bioshield_user:CHANGE_ME_SECURE_PASSWORD@postgres.bioshield-system.svc.cluster.local:5432/bioshield"
  redis.password: "CHANGE_ME_REDIS_PASSWORD"
  stripe.api.key: "sk_live_CHANGE_ME"
  jwt.secret: "CHANGE_ME_JWT_SECRET_32_BYTES_MINIMUM"
  admin.api.key: "sk_admin_CHANGE_ME"
