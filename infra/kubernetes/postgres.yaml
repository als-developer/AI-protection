apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: bioshield-system
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "bioshield"
        - name: POSTGRES_USER
          value: "bioshield_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bioshield-secrets
              key: database.url
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
      volumes:
      - name: init-scripts
        configMap:
          name: postgres-init-scripts
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bioshield-system
spec:
  clusterIP: None
  ports:
  - port: 5432
  selector:
    app: postgres
