apiVersion: apps/v1
kind: Deployment
metadata:
  name: bioshield-api
  namespace: bioshield-system
  labels:
    app: bioshield
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bioshield
      component: api
  template:
    metadata:
      labels:
        app: bioshield
        component: api
    spec:
      nodeSelector:
        node-type: compute-optimized
      containers:
      - name: api
        image: bioshield/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: bioshield-config
              key: redis.host
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bioshield-secrets
              key: database.url
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: "2"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /v1/health/liveness
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/health/readiness
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        envFrom:
        - configMapRef:
            name: bioshield-config
