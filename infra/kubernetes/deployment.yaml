apiVersion: apps/v1
kind: Deployment
metadata:
  name: bioshield-core
  namespace: bioshield-system
  labels:
    app: bioshield
    tier: core
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bioshield
      tier: core
  template:
    metadata:
      labels:
        app: bioshield
        tier: core
    spec:
      nodeSelector:
        node-type: compute-optimized
      containers:
      - name: api-gateway
        image: bioshield/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: bioshield-config
              key: redis.host
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bioshield-secrets
              key: database.url
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /v1/health/liveness
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/health/readiness
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: engine-lib
          mountPath: /usr/local/lib
      - name: cpp-engine
        image: bioshield/engine:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: CORE_AFFINITY_CORE
          value: "0"
        - name: REALTIME_PRIORITY
          value: "99"
        resources:
          requests:
            cpu: "4"
            memory: "2Gi"
          limits:
            cpu: "8"
            memory: "4Gi"
        volumeMounts:
        - name: ebpf-programs
          mountPath: /sys/fs/bpf
          mountPropagation: Bidirectional
        - name: engine-lib
          mountPath: /usr/local/lib
      volumes:
      - name: ebpf-programs
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
      - name: engine-lib
        emptyDir: {}
